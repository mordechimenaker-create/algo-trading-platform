name: Release EXE

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (e.g. v31e5266)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows portable EXE
        run: npm run desktop:pack

      - name: Upload EXE to existing release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.tag }}" \
            "desktop/dist/Algo-Trading-Platform-1.0.0-x64.exe" \
            --clobber
