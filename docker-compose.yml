services:
  postgres:
    image: postgres:16-alpine
    container_name: algo-postgres
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: password
      POSTGRES_DB: trading_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algo-network

  redis:
    image: redis:7-alpine
    container_name: algo-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algo-backend
    environment:
      DB_USER: trader
      DB_PASSWORD: password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: trading_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_DAYS: ${REFRESH_TOKEN_EXPIRES_DAYS:-30}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_PUBLIC_MAX: ${RATE_LIMIT_PUBLIC_MAX:-120}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-20}
      RATE_LIMIT_PRIVATE_MAX: ${RATE_LIMIT_PRIVATE_MAX:-240}
      BILLING_GRACE_DAYS: ${BILLING_GRACE_DAYS:-3}
      STRICT_USAGE_CAP: ${STRICT_USAGE_CAP:-1}
      BACKTEST_FEE_BPS: ${BACKTEST_FEE_BPS:-0}
      BACKTEST_FEE_FIXED: ${BACKTEST_FEE_FIXED:-0}
      BACKTEST_SLIPPAGE_BPS: ${BACKTEST_SLIPPAGE_BPS:-0}
      BACKTEST_LATENCY_MS: ${BACKTEST_LATENCY_MS:-0}
      APP_URL: ${APP_URL:-http://localhost:8081}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_PRO: ${STRIPE_PRICE_ID_PRO:-}
      STRIPE_PRICE_ID_ENTERPRISE: ${STRIPE_PRICE_ID_ENTERPRISE:-}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algo-network
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: algo-frontend
    ports:
      - "8081:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - algo-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  algo-network:
    driver: bridge
