services:
  postgres:
    image: postgres:16-alpine
    container_name: algo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-trading_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - algo-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: algo-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - algo-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algo-backend
    environment:
      DB_USER: ${POSTGRES_USER:-trader}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-trading_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_DAYS: ${REFRESH_TOKEN_EXPIRES_DAYS:-30}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_PUBLIC_MAX: ${RATE_LIMIT_PUBLIC_MAX:-120}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-20}
      RATE_LIMIT_PRIVATE_MAX: ${RATE_LIMIT_PRIVATE_MAX:-240}
      BILLING_GRACE_DAYS: ${BILLING_GRACE_DAYS:-3}
      STRICT_USAGE_CAP: ${STRICT_USAGE_CAP:-1}
      BACKTEST_FEE_BPS: ${BACKTEST_FEE_BPS:-0}
      BACKTEST_FEE_FIXED: ${BACKTEST_FEE_FIXED:-0}
      BACKTEST_SLIPPAGE_BPS: ${BACKTEST_SLIPPAGE_BPS:-0}
      BACKTEST_LATENCY_MS: ${BACKTEST_LATENCY_MS:-0}
      APP_URL: ${APP_URL:-http://localhost:8081}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_PRO: ${STRIPE_PRICE_ID_PRO:-}
      STRIPE_PRICE_ID_ENTERPRISE: ${STRIPE_PRICE_ID_ENTERPRISE:-}
    depends_on:
      - postgres
      - redis
    networks:
      - algo-network
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: algo-frontend
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - algo-network
    restart: unless-stopped

  reverse-proxy:
    image: nginx:alpine
    container_name: algo-reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - algo-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  algo-network:
    driver: bridge
